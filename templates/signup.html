<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
</head>
<body>

<h1>Signup</h1>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username">
    <br><br>

    <input type="password" name="password" placeholder="Password">
    <br><br>

    <button type="submit">Signup</button>
</form>

</body>
</html>
