<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        .form-box{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:20px;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            background:black;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="form-box">

    <h1>Edit Profile</h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <input type="text" name="full_name" value="{{ profile.full_name }}" placeholder="Full Name">

        <input type="text" name="branch" value="{{ profile.branch }}" placeholder="Branch">

        <textarea name="skills">{{ profile.skills }}</textarea>

        <input type="text" name="cgpa" value="{{ profile.cgpa }}" placeholder="CGPA">

        <textarea name="bio">{{ profile.bio }}</textarea>

        <input type="text" name="resume_link" value="{{ profile.resume_link }}" placeholder="Resume Link">
        <input type="file" name="resume">

        <button type="submit">Save Changes</button>

    </form>

</div>

</body>
</html>
